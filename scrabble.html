<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scrabble en ligne</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;
  --surface:#fffdf7;
  --border:#d8cdb8;
  --text:#1a1410;
  --muted:#7a6e60;
  --accent:#8b3a0f;
  --accent2:#c4672a;
  --tile-bg:#f9e87a;
  --tile-border:#c8a020;
  --tile-text:#2a1a00;
  --tw:#b91c1c;--dw:#e57373;--tl:#1565c0;--dl:#64b5f6;
  --center:#e57373;
  --placed:#f5d040;
  --fixed:#d4b830;
  --radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,0.10);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

/* LOBBY */
.lobby-wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(139,58,15,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 90%, rgba(196,103,42,0.07) 0%, transparent 60%),
    var(--bg);
}
.lobby-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:2.5rem 2rem;
  width:100%;
  max-width:400px;
  box-shadow:0 8px 40px rgba(0,0,0,0.10);
}
.lobby-logo{
  font-family:'Playfair Display',serif;
  font-size:2.2rem;
  color:var(--accent);
  text-align:center;
  letter-spacing:2px;
  margin-bottom:0.2rem;
}
.lobby-sub{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:2rem;
}
.field-group{margin-bottom:1rem}
.field-group label{
  display:block;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--muted);
  margin-bottom:6px;
}
.field-group input{
  width:100%;
  padding:11px 14px;
  font-size:15px;
  font-family:'DM Sans',sans-serif;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  background:var(--bg);
  color:var(--text);
  outline:none;
  transition:border-color 0.2s;
}
.field-group input:focus{border-color:var(--accent2)}
.field-group input.code-input{
  font-family:'DM Mono',monospace;
  font-size:22px;
  letter-spacing:8px;
  text-align:center;
  text-transform:uppercase;
}
.btn-primary{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-size:15px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  cursor:pointer;
  transition:background 0.18s,transform 0.1s;
}
.btn-primary:hover{background:#6e2d09;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{
  width:100%;
  padding:11px;
  background:transparent;
  color:var(--accent);
  border:1.5px solid var(--accent);
  border-radius:var(--radius);
  font-size:15px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  cursor:pointer;
  transition:background 0.18s;
}
.btn-secondary:hover{background:rgba(139,58,15,0.07)}
.divider{
  display:flex;
  align-items:center;
  gap:10px;
  margin:1.2rem 0;
  color:var(--muted);
  font-size:13px;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.err{color:#b91c1c;font-size:13px;margin-top:8px;min-height:18px}

/* WAITING */
.room-code-display{
  font-family:'DM Mono',monospace;
  font-size:2.8rem;
  letter-spacing:10px;
  text-align:center;
  color:var(--accent);
  background:var(--bg);
  border:2px dashed var(--accent2);
  border-radius:var(--radius);
  padding:1rem;
  margin:1.2rem 0;
}
.copy-btn{
  display:block;
  margin:0 auto 1rem;
  padding:8px 20px;
  background:transparent;
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--muted);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  cursor:pointer;
  transition:background 0.15s,color 0.15s;
}
.copy-btn:hover{background:var(--bg);color:var(--text)}
.pulse{
  display:inline-block;
  width:10px;height:10px;
  border-radius:50%;
  background:#f59e0b;
  animation:pulse 1.4s infinite;
  margin-right:6px;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}

/* GAME LAYOUT */
#gameScreen{display:none;min-height:100vh;background:var(--bg)}
.game-topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
.game-title{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  color:var(--accent);
  margin-right:auto;
}
.conn-status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:#22c55e}
.dot.waiting{background:#f59e0b}
.room-tag{
  font-family:'DM Mono',monospace;
  font-size:13px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:6px;
  padding:4px 10px;
  color:var(--accent);
}
.quit-btn{
  padding:6px 14px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  color:var(--muted);
  transition:background 0.15s;
}
.quit-btn:hover{background:var(--bg)}

.game-body{
  display:grid;
  grid-template-columns:1fr 230px;
  gap:12px;
  padding:12px;
  max-width:900px;
  margin:0 auto;
}
@media(max-width:640px){
  .game-body{grid-template-columns:1fr}
  .sidebar{order:-1}
}

/* BOARD */
.board-scroll{overflow:auto}
.board{
  display:grid;
  grid-template-columns:repeat(15,1fr);
  gap:1.5px;
  background:var(--border);
  border:2px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  min-width:320px;
  box-shadow:var(--shadow);
}
.cell{
  aspect-ratio:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  background:#faf6ee;
  position:relative;
  transition:filter 0.1s;
  user-select:none;
}
.cell:hover{filter:brightness(0.93)}
.cell.drop-target{outline:3px solid var(--accent);outline-offset:-3px;filter:brightness(0.92)}
.cell.tw{background:var(--tw);color:#fff}
.cell.dw{background:var(--dw);color:#fff}
.cell.tl{background:var(--tl);color:#fff}
.cell.dl{background:var(--dl);color:#fff}
.cell.center{background:var(--center);color:#fff}
.cell.placed{background:var(--placed)!important;cursor:default}
.cell.fixed{background:var(--fixed)!important;cursor:default}
.bonus-label{font-size:7px;font-weight:600;opacity:0.9;line-height:1}
.letter-in-cell{font-size:12px;font-weight:700;color:#1a1000;line-height:1;font-family:'DM Sans',sans-serif}
.score-in-cell{font-size:6px;color:#5a4500;position:absolute;bottom:1px;right:2px}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:10px}
.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;
}
.panel-title{
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:var(--muted);
  margin-bottom:8px;
}
.turn-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:600;
  background:#fef3c7;
  color:#92400e;
  width:100%;
  justify-content:center;
}
.turn-badge.my{background:#dcfce7;color:#166534}
.score-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:5px 0;
}
.score-row:not(:last-child){border-bottom:1px solid var(--border)}
.score-name{font-size:14px;font-weight:500}
.score-pts{
  font-family:'DM Mono',monospace;
  font-size:17px;
  font-weight:500;
  color:var(--accent);
}
.rack{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tile{
  width:34px;height:34px;
  background:var(--tile-bg);
  border:2px solid var(--tile-border);
  border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
  color:var(--tile-text);
  cursor:pointer;
  position:relative;
  font-family:'DM Sans',sans-serif;
  transition:transform 0.12s,box-shadow 0.12s;
  flex-shrink:0;
  box-shadow:0 2px 0 var(--tile-border);
}
.tile:hover{transform:translateY(-2px);box-shadow:0 4px 0 var(--tile-border)}
.tile.dragging{opacity:0.55;transform:translateY(-5px);box-shadow:0 5px 0 var(--accent)}
.tile.selected{
  transform:translateY(-5px);
  border-color:var(--accent);
  box-shadow:0 5px 0 var(--accent);
}
.tile.blank{background:#f0ede6;border-color:#a09888}
.tile-score{font-size:6px;color:#7a5500;position:absolute;bottom:1px;right:2px;font-weight:500}

.word-preview{
  font-size:12px;
  color:var(--accent);
  font-weight:600;
  min-height:16px;
  margin-top:6px;
  font-family:'DM Mono',monospace;
}
.info-row{font-size:12px;color:var(--muted);margin-top:3px}

.actions{display:flex;flex-direction:column;gap:6px}
.btn-action{
  padding:10px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  cursor:pointer;
  transition:background 0.15s,transform 0.1s;
}
.btn-action:hover:not(:disabled){background:#6e2d09;transform:translateY(-1px)}
.btn-action:disabled{background:#c8bfb0;color:#8a7e72;cursor:not-allowed}
.btn-pass{
  background:transparent;
  color:var(--muted);
  border:1.5px solid var(--border);
}
.btn-pass:hover:not(:disabled){background:var(--bg);transform:translateY(-1px)}
.btn-recall{
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
  padding:7px;
  font-size:13px;
}

/* CHAT */
.chat-box{
  height:110px;
  overflow-y:auto;
  font-size:13px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  margin-bottom:6px;
  color:var(--muted);
}
.chat-msg{margin-bottom:4px;line-height:1.4}
.chat-from{font-weight:600;color:var(--text)}
.chat-row{display:flex;gap:6px}
.chat-row input{
  flex:1;
  padding:7px 10px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  outline:none;
}
.chat-row input:focus{border-color:var(--accent2)}
.chat-row button{
  padding:7px 12px;
  background:var(--accent);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
  font-weight:600;
}

.screen{display:none}
.screen.active{display:block}
#gameScreen.active{display:block}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen active">
  <div class="lobby-wrap">
    <div class="lobby-card">
      <div class="lobby-logo">SCRABBLE</div>
      <p class="lobby-sub">Joue avec tes amis, chacun chez soi</p>

      <div class="field-group">
        <label>Ton prénom</label>
        <input type="text" id="nameInput" placeholder="Ex : Abdias" maxlength="20"/>
      </div>

      <button class="btn-primary" onclick="createRoom()">Créer une nouvelle partie</button>

      <div class="divider">ou rejoindre une partie existante</div>

      <div class="field-group">
        <label>Code de la salle</label>
        <input type="text" id="codeInput" class="code-input" placeholder="ABCD" maxlength="6"/>
      </div>
      <button class="btn-secondary" onclick="joinRoom()">Rejoindre</button>
      <p class="err" id="lobbyErr"></p>
    </div>
  </div>
</div>

<!-- WAITING -->
<div id="waitingScreen" class="screen">
  <div class="lobby-wrap">
    <div class="lobby-card">
      <div class="lobby-logo">⏳</div>
      <p class="lobby-sub" id="waitingTitle">Salle créée ! Envoie ce code à ton ami</p>
      <div class="room-code-display" id="displayCode">----</div>
      <button class="copy-btn" onclick="copyCode()">Copier le code</button>
      <p style="text-align:center;font-size:14px;color:var(--muted)" id="waitingStatus">
        <span class="pulse"></span>En attente d'un adversaire...
      </p>
      <button class="btn-secondary" style="margin-top:1.5rem" onclick="cancelWait()">Annuler</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="game-topbar">
    <span class="game-title">Scrabble</span>
    <div class="conn-status">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">Connecté</span>
    </div>
    <span class="room-tag" id="gameCodeTag">----</span>
    <button class="quit-btn" onclick="leaveGame()">Quitter</button>
  </div>

  <div class="game-body">
    <!-- Board -->
    <div class="board-scroll">
      <div class="board" id="board"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Tour actuel</div>
        <div class="turn-badge" id="turnBadge">Chargement...</div>
      </div>
      <div class="panel">
        <div class="panel-title">Scores</div>
        <div class="score-row">
          <span class="score-name" id="myNameDisp">-</span>
          <span class="score-pts" id="myScore">0</span>
        </div>
        <div class="score-row">
          <span class="score-name" id="oppNameDisp">-</span>
          <span class="score-pts" id="oppScore">0</span>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">Mon chevalet</div>
        <div class="rack" id="rack"></div>
        <div class="word-preview" id="wordPreview"></div>
        <div class="info-row" id="infoRow"></div>
      </div>
      <div class="panel actions">
        <button class="btn-action" id="btnPlay" onclick="playWord()" disabled>Valider le mot</button>
        <button class="btn-action btn-pass" onclick="passTurn()">⏭ Passer mon tour</button>
        <button class="btn-action btn-pass" onclick="exchangeSelectedTiles()">Échanger la sélection</button>
        <button class="btn-action btn-recall" onclick="recallTiles()">Rappeler les lettres</button>
      </div>
      <div class="panel">
        <div class="panel-title">Messages</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-row">
          <input type="text" id="chatInput" placeholder="Écris un message..." maxlength="120"
            onkeydown="if(event.key==='Enter')sendChat()"/>
          <button onclick="sendChat()">Envoyer</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FR_TILES=[
  ...Array(9).fill({l:'A',v:1}),...Array(2).fill({l:'B',v:3}),...Array(2).fill({l:'C',v:3}),
  ...Array(3).fill({l:'D',v:2}),...Array(15).fill({l:'E',v:1}),...Array(2).fill({l:'F',v:4}),
  ...Array(2).fill({l:'G',v:2}),...Array(2).fill({l:'H',v:4}),...Array(8).fill({l:'I',v:1}),
  ...Array(1).fill({l:'J',v:8}),...Array(1).fill({l:'K',v:10}),...Array(5).fill({l:'L',v:1}),
  ...Array(3).fill({l:'M',v:2}),...Array(6).fill({l:'N',v:1}),...Array(6).fill({l:'O',v:1}),
  ...Array(2).fill({l:'P',v:3}),...Array(1).fill({l:'Q',v:8}),...Array(6).fill({l:'R',v:1}),
  ...Array(6).fill({l:'S',v:1}),...Array(6).fill({l:'T',v:1}),...Array(6).fill({l:'U',v:1}),
  ...Array(2).fill({l:'V',v:4}),...Array(1).fill({l:'W',v:10}),...Array(1).fill({l:'X',v:10}),
  ...Array(1).fill({l:'Y',v:10}),...Array(1).fill({l:'Z',v:10}),...Array(2).fill({l:'',v:0})
];

const BONUS={
  '0,0':'tw','0,7':'tw','0,14':'tw','7,0':'tw','7,14':'tw','14,0':'tw','14,7':'tw','14,14':'tw',
  '1,1':'dw','2,2':'dw','3,3':'dw','4,4':'dw','1,13':'dw','2,12':'dw','3,11':'dw','4,10':'dw',
  '10,4':'dw','11,3':'dw','12,2':'dw','13,1':'dw','10,10':'dw','11,11':'dw','12,12':'dw','13,13':'dw',
  '5,1':'tl','5,5':'tl','5,9':'tl','5,13':'tl','9,1':'tl','9,5':'tl','9,9':'tl','9,13':'tl',
  '1,5':'tl','13,5':'tl','1,9':'tl','13,9':'tl',
  '0,3':'dl','0,11':'dl','2,6':'dl','2,8':'dl','3,0':'dl','3,7':'dl','3,14':'dl',
  '6,2':'dl','6,6':'dl','6,8':'dl','6,12':'dl','7,3':'dl','7,11':'dl',
  '8,2':'dl','8,6':'dl','8,8':'dl','8,12':'dl','11,0':'dl','11,7':'dl','11,14':'dl',
  '12,6':'dl','12,8':'dl','14,3':'dl','14,11':'dl','7,7':'center'
};

const BONUS_LABELS={tw:'M x3',dw:'M x2',tl:'L x3',dl:'L x2',center:'*'};

const SUPABASE_URL='https://ljdirfcxnvqsmdxzflad.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_NEwEz6jFXMRqMgkvRlSDsQ_h8reR4Co';
const TURN_SECONDS=180;
const DICTIONARY_URL='https://cdn.jsdelivr.net/npm/an-array-of-french-words@2.0.0/index.json';

const playerId=localStorage.getItem('scrabblePlayerId')||crypto.randomUUID();
localStorage.setItem('scrabblePlayerId',playerId);
let state=initialState();
let draggedTileIdx=-1;
let roomChannel=null;
let turnTimer=null;
let currentRoomRow=null;
let autoPassing=false;
let dictionaryWords=null;
let dictionaryPromise=null;

function initialState(){
  return {
    board:Array(15).fill(null).map(()=>Array(15).fill(null)),
    bag:[],turn:null,
    myId:playerId,myName:'',oppId:null,oppName:'',
    isHost:false,room:'',
    rack:[],placed:[],
    selectedTileIdx:-1,
    scores:{},
    turnEndsAt:null,
    chat:[],
    passCount:0,
    gameOver:false,
    winner:null
  };
}

function getSupabase(){
  if(SUPABASE_URL.includes('REMPLACE')||SUPABASE_ANON_KEY.includes('REMPLACE')){
    throw new Error('Configuration Supabase manquante dans scrabble.html.');
  }
  return window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
}

const db=(()=>{try{return getSupabase();}catch(e){return null;}})();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ';
  let r='';for(let i=0;i<4;i++)r+=c[Math.floor(Math.random()*c.length)];
  return r;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function drawTiles(n){
  const d=[];
  for(let i=0;i<n&&state.bag.length;i++)d.push(state.bag.pop());
  return d;
}

function makeGame(code,name){
  return {
    code,
    started:false,
    hostId:playerId,
    players:[{id:playerId,name}],
    board:Array(15).fill(null).map(()=>Array(15).fill(null)),
    bag:[],
    racks:{},
    scores:{[playerId]:0},
    turn:null,
    turnEndsAt:null,
    passCount:0,
    gameOver:false,
    winner:null,
    chat:[{from:'Système',text:'Salle créée.'}]
  };
}

function startGameData(game){
  const bag=shuffle([...FR_TILES]);
  const p1=game.players[0];
  const p2=game.players[1];
  game.started=true;
  game.bag=bag;
  game.racks[p1.id]=bag.splice(0,7);
  game.racks[p2.id]=bag.splice(0,7);
  game.scores[p1.id]=0;
  game.scores[p2.id]=0;
  game.turn=p1.id;
  game.turnEndsAt=nextTurnEndsAt();
  game.passCount=0;
  game.gameOver=false;
  game.winner=null;
  game.chat=[...(game.chat||[]),{from:'Système',text:'La partie commence.'}];
  return game;
}

function nextTurnEndsAt(){
  return new Date(Date.now()+TURN_SECONDS*1000).toISOString();
}

function normalizeWord(word){
  return word
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z]/g,'')
    .toUpperCase();
}

async function loadDictionary(){
  if(dictionaryWords)return dictionaryWords;
  if(!dictionaryPromise){
    dictionaryPromise=fetch(DICTIONARY_URL)
      .then(res=>{
        if(!res.ok)throw new Error('Dictionnaire indisponible');
        return res.json();
      })
      .then(words=>{
        dictionaryWords=new Set(words.map(normalizeWord).filter(word=>word.length>=2));
        return dictionaryWords;
      });
  }
  return dictionaryPromise;
}

async function validateDictionaryWords(words){
  const dict=await loadDictionary();
  const invalid=words.map(w=>w.word).filter(word=>!dict.has(normalizeWord(word)));
  return {ok:invalid.length===0,invalid};
}

function showConfigError(){
  document.getElementById('lobbyErr').textContent='Supabase n’est pas configuré. Mets SUPABASE_URL et SUPABASE_ANON_KEY dans scrabble.html.';
}

async function createRoom(){
  const name=document.getElementById('nameInput').value.trim();
  if(!name){document.getElementById('lobbyErr').textContent='Entre ton prénom.';return;}
  if(!db){showConfigError();return;}
  document.getElementById('lobbyErr').textContent='';
  state.myName=name;state.isHost=true;
  state.room=genCode();
  document.getElementById('waitingTitle').textContent='Salle créée ! Envoie ce code à ton ami';
  document.getElementById('displayCode').textContent=state.room;
  document.getElementById('waitingStatus').innerHTML='<span class="pulse"></span>Connexion au serveur...';
  showScreen('waitingScreen');
  const {error}=await db.from('scrabble_rooms').insert({code:state.room,game:makeGame(state.room,name)});
  if(error){
    document.getElementById('lobbyErr').textContent='Création impossible : '+error.message;
    showScreen('lobbyScreen');
    return;
  }
  subscribeRoom(state.room);
  document.getElementById('waitingStatus').innerHTML='<span class="pulse"></span>Salle prête. En attente d\'un adversaire...';
}

async function joinRoom(){
  const name=document.getElementById('nameInput').value.trim();
  const code=document.getElementById('codeInput').value.trim().toUpperCase();
  if(!name){document.getElementById('lobbyErr').textContent='Entre ton prénom.';return;}
  if(code.length<2){document.getElementById('lobbyErr').textContent='Entre le code de la salle.';return;}
  if(!db){showConfigError();return;}
  document.getElementById('lobbyErr').textContent='';
  state.myName=name;state.isHost=false;state.room=code;
  document.getElementById('waitingTitle').textContent='Connexion à la salle...';
  document.getElementById('displayCode').textContent=state.room;
  document.getElementById('waitingStatus').innerHTML='<span class="pulse"></span>Recherche de la partie...';
  showScreen('waitingScreen');
  const {data,error}=await db.from('scrabble_rooms').select('*').eq('code',code).single();
  if(error||!data){
    document.getElementById('lobbyErr').textContent='Salle introuvable. Vérifie le code.';
    showScreen('lobbyScreen');
    return;
  }
  const game=data.game;
  if(!game.players.some(p=>p.id===playerId)){
    if(game.players.length>=2){
      document.getElementById('lobbyErr').textContent='Cette salle est déjà complète.';
      showScreen('lobbyScreen');
      return;
    }
    game.players.push({id:playerId,name});
    startGameData(game);
    const {error:updateError}=await db.from('scrabble_rooms').update({game,updated_at:new Date().toISOString()}).eq('code',code);
    if(updateError){
      document.getElementById('lobbyErr').textContent='Connexion impossible : '+updateError.message;
      showScreen('lobbyScreen');
      return;
    }
  }
  subscribeRoom(code);
  applyRemoteGame(game);
}

function copyCode(){
  const t=document.getElementById('displayCode').textContent;
  navigator.clipboard.writeText(t).catch(()=>{});
  const btn=document.querySelector('.copy-btn');
  btn.textContent='Copié !';
  setTimeout(()=>btn.textContent='Copier le code',1500);
}

function cancelWait(){
  unsubscribeRoom();
  showScreen('lobbyScreen');
}

function subscribeRoom(code){
  unsubscribeRoom();
  roomChannel=db.channel('scrabble-room-'+code)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'scrabble_rooms',filter:'code=eq.'+code},payload=>{
      applyRemoteGame(payload.new.game);
    })
    .subscribe(status=>{
      const connected=status==='SUBSCRIBED';
      document.getElementById('connDot').className=connected?'dot':'dot waiting';
      document.getElementById('connLabel').textContent=connected?'Connecté':'Synchronisation...';
    });
}

function unsubscribeRoom(){
  if(roomChannel&&db)db.removeChannel(roomChannel);
  roomChannel=null;
  if(turnTimer){clearInterval(turnTimer);turnTimer=null;}
}

async function saveGame(game){
  currentRoomRow={code:game.code,game};
  const {error}=await db.from('scrabble_rooms').update({game,updated_at:new Date().toISOString()}).eq('code',game.code);
  if(error)addChat('Système','Sauvegarde impossible : '+error.message);
}

function applyRemoteGame(game){
  currentRoomRow={code:game.code,game:structuredClone(game)};
  const me=game.players.find(p=>p.id===playerId);
  const opp=game.players.find(p=>p.id!==playerId);
  state.board=game.board;
  state.bag=game.bag||[];
  state.turn=game.turn;
  state.myId=playerId;
  state.myName=me?me.name:state.myName;
  state.oppId=opp?opp.id:null;
  state.oppName=opp?opp.name:'Adversaire';
  state.isHost=game.hostId===playerId;
  state.room=game.code;
  state.rack=(game.racks&&game.racks[playerId])?game.racks[playerId]:[];
  state.scores=game.scores||{};
  state.turnEndsAt=game.turnEndsAt||null;
  state.chat=game.chat||[];
  state.passCount=game.passCount||0;
  state.gameOver=!!game.gameOver;
  state.winner=game.winner||null;
  state.placed=[];state.selectedTileIdx=-1;
  if(!game.started){
    document.getElementById('waitingStatus').innerHTML='<span class="pulse"></span>Salle prête. En attente d\'un adversaire...';
    return;
  }
  startGame();
}

function startGame(){
  document.getElementById('gameCodeTag').textContent=state.room;
  document.getElementById('myNameDisp').textContent=state.myName;
  document.getElementById('oppNameDisp').textContent=state.oppName;
  showScreen('gameScreen');
  renderBoard();renderRack();renderChat();updateUI();startTurnTimer();
}

function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<15;r++){
    for(let c=0;c<15;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      const key=r+','+c;
      const bon=BONUS[key];
      if(bon)cell.classList.add(bon);
      const pl=state.placed.find(p=>p.r===r&&p.c===c);
      if(pl){
        cell.classList.add('placed');
        cell.innerHTML='<span class="letter-in-cell">'+pl.tile.l+'</span><span class="score-in-cell">'+pl.tile.v+'</span>';
      } else if(state.board[r][c]){
        cell.classList.add('fixed');
        cell.innerHTML='<span class="letter-in-cell">'+state.board[r][c].l+'</span><span class="score-in-cell">'+state.board[r][c].v+'</span>';
      } else {
        if(bon)cell.innerHTML='<span class="bonus-label">'+BONUS_LABELS[bon]+'</span>';
        cell.onclick=()=>placeOnCell(r,c);
        cell.dataset.row=r;
        cell.dataset.col=c;
        cell.ondragover=handleCellDragOver;
        cell.ondragenter=()=>cell.classList.add('drop-target');
        cell.ondragleave=()=>cell.classList.remove('drop-target');
        cell.ondrop=e=>dropOnCell(e,r,c);
      }
      board.appendChild(cell);
    }
  }
}

function renderRack(){
  const rack=document.getElementById('rack');
  rack.innerHTML='';
  state.rack.forEach((tile,i)=>{
    if(!tile)return;
    const el=document.createElement('div');
    el.className='tile'+(tile.l===''?' blank':'')+(i===state.selectedTileIdx?' selected':'');
    el.innerHTML=(tile.l||'*')+'<span class="tile-score">'+tile.v+'</span>';
    el.onclick=()=>selectTile(i);
    el.draggable=state.turn===playerId;
    el.dataset.tileIndex=i;
    el.ondragstart=e=>startTileDrag(e,i);
    el.ondragend=e=>endTileDrag(e);
    rack.appendChild(el);
  });
}

function startTileDrag(e,i){
  if(state.turn!==playerId){e.preventDefault();return;}
  draggedTileIdx=i;
  state.selectedTileIdx=i;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(i));
}

function endTileDrag(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.cell.drop-target').forEach(cell=>cell.classList.remove('drop-target'));
  draggedTileIdx=-1;
  renderRack();
}

function handleCellDragOver(e){
  if(state.turn!==playerId)return;
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
}

function dropOnCell(e,r,c){
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const raw=e.dataTransfer.getData('text/plain');
  const idx=draggedTileIdx>=0?draggedTileIdx:Number(raw);
  placeOnCell(r,c,idx);
}

function selectTile(i){
  if(state.turn!==playerId)return;
  state.selectedTileIdx=(state.selectedTileIdx===i)?-1:i;
  renderRack();
}

function placeOnCell(r,c,tileIdx=state.selectedTileIdx){
  if(state.turn!==playerId)return;
  if(tileIdx<0){document.getElementById('infoRow').textContent='Sélectionne d\'abord une lettre ou glisse-la sur le plateau.';return;}
  if(!state.rack[tileIdx])return;
  if(state.placed.find(p=>p.r===r&&p.c===c))return;
  const tile={...state.rack[tileIdx]};
  if(tile.l===''){
    const letter=prompt('Quelle lettre pour la tuile blanche ?','');
    if(!letter)return;
    tile.l=letter.toUpperCase()[0];
  }
  state.placed.push({r,c,tile});
  state.rack.splice(tileIdx,1);
  state.selectedTileIdx=-1;
  draggedTileIdx=-1;
  renderBoard();renderRack();updateWordPreview();
}

function updateWordPreview(){
  if(!state.placed.length){document.getElementById('wordPreview').textContent='';return;}
  const analysis=analyzeMove();
  if(!analysis.ok){
    document.getElementById('wordPreview').textContent='';
    document.getElementById('infoRow').textContent=analysis.msg;
    document.getElementById('btnPlay').disabled=true;
    return;
  }
  document.getElementById('wordPreview').textContent=analysis.words.map(w=>w.word).join(' + ')+' -> '+analysis.score+' pts';
  document.getElementById('infoRow').textContent=analysis.msg;
  document.getElementById('btnPlay').disabled=false;
}

function boardHasTiles(){
  return state.board.some(row=>row.some(Boolean));
}

function placedAt(r,c){
  return state.placed.find(p=>p.r===r&&p.c===c);
}

function tileAt(r,c){
  if(r<0||r>14||c<0||c>14)return null;
  const placed=placedAt(r,c);
  return placed?placed.tile:state.board[r][c];
}

function isNewTile(r,c){
  return !!placedAt(r,c);
}

function wordAt(r,c,dr,dc){
  let sr=r,sc=c;
  while(tileAt(sr-dr,sc-dc)){sr-=dr;sc-=dc;}
  const cells=[];
  let cr=sr,cc=sc;
  while(tileAt(cr,cc)){
    cells.push({r:cr,c:cc,tile:tileAt(cr,cc),isNew:isNewTile(cr,cc)});
    cr+=dr;cc+=dc;
  }
  return cells;
}

function scoreWord(cells){
  let base=0;
  let mult=1;
  cells.forEach(({r,c,tile,isNew})=>{
    let letterScore=tile.v;
    if(isNew){
      const bon=BONUS[r+','+c];
      if(bon==='tl')letterScore*=3;
      if(bon==='dl')letterScore*=2;
      if(bon==='tw')mult*=3;
      if(bon==='dw'||bon==='center')mult*=2;
    }
    base+=letterScore;
  });
  return base*mult;
}

function cellsToWord(cells){
  return cells.map(cell=>cell.tile.l).join('');
}

function sameCells(a,b){
  if(a.length!==b.length)return false;
  return a.every((cell,i)=>cell.r===b[i].r&&cell.c===b[i].c);
}

function addWord(words,cells){
  if(cells.length<2)return;
  if(words.some(w=>sameCells(w.cells,cells)))return;
  words.push({word:cellsToWord(cells),cells,score:scoreWord(cells)});
}

function analyzeMove(){
  if(!state.placed.length)return {ok:false,msg:'Pose au moins une lettre.',score:0,words:[]};
  const rows=[...new Set(state.placed.map(p=>p.r))];
  const cols=[...new Set(state.placed.map(p=>p.c))];
  if(rows.length>1&&cols.length>1)return {ok:false,msg:'Toutes les lettres doivent être sur la même ligne ou colonne.',score:0,words:[]};

  const firstMove=!boardHasTiles();
  if(firstMove&&!state.placed.some(p=>p.r===7&&p.c===7)){
    return {ok:false,msg:'Le premier mot doit passer par la case étoile centrale.',score:0,words:[]};
  }

  const horizontal=rows.length===1;
  const vertical=cols.length===1;
  let dr=0,dc=1;
  if(vertical&&!horizontal){dr=1;dc=0;}
  if(horizontal&&vertical){
    const p=state.placed[0];
    const h=tileAt(p.r,p.c-1)||tileAt(p.r,p.c+1);
    const v=tileAt(p.r-1,p.c)||tileAt(p.r+1,p.c);
    if(v&&!h){dr=1;dc=0;}
  }

  const line=horizontal?rows[0]:cols[0];
  const coords=horizontal?state.placed.map(p=>p.c):state.placed.map(p=>p.r);
  const min=Math.min(...coords);
  const max=Math.max(...coords);
  for(let i=min;i<=max;i++){
    const r=horizontal?line:i;
    const c=horizontal?i:line;
    if(!tileAt(r,c))return {ok:false,msg:'Les lettres du mot doivent se toucher, sans trou.',score:0,words:[]};
  }

  const connected=firstMove||state.placed.some(({r,c})=>
    state.board[r][c-1]||state.board[r][c+1]||
    (state.board[r-1]&&state.board[r-1][c])||
    (state.board[r+1]&&state.board[r+1][c])
  );
  if(!connected)return {ok:false,msg:'Le mot doit toucher une lettre déjà posée.',score:0,words:[]};

  const words=[];
  const anchor=state.placed[0];
  addWord(words,wordAt(anchor.r,anchor.c,dr,dc));
  state.placed.forEach(({r,c})=>addWord(words,wordAt(r,c,dc,dr)));

  if(!words.length)return {ok:false,msg:'Un coup doit former au moins un mot de deux lettres.',score:0,words:[]};
  const bingo=state.placed.length===7?50:0;
  const score=words.reduce((sum,w)=>sum+w.score,0)+bingo;
  const msg=bingo?'Scrabble ! Bonus de 50 points.':'Coup valide.';
  return {ok:true,msg,score,words};
}

function calcScore(){
  const analysis=analyzeMove();
  return analysis.ok?analysis.score:0;
}

function recallTiles(){
  state.placed.forEach(p=>state.rack.push(p.tile));
  state.placed=[];state.selectedTileIdx=-1;
  renderBoard();renderRack();
  document.getElementById('btnPlay').disabled=true;
  document.getElementById('wordPreview').textContent='';
  document.getElementById('infoRow').textContent='';
}

function rackValue(rack){
  return (rack||[]).reduce((sum,tile)=>sum+tile.v,0);
}

function finishGame(game,winnerId,reason){
  const players=game.players||[];
  const remaining={};
  players.forEach(player=>{remaining[player.id]=rackValue(game.racks[player.id]);});
  players.forEach(player=>{game.scores[player.id]=(game.scores[player.id]||0)-remaining[player.id];});
  if(winnerId)game.scores[winnerId]=(game.scores[winnerId]||0)+Object.entries(remaining).filter(([id])=>id!==winnerId).reduce((sum,[,value])=>sum+value,0);
  game.gameOver=true;
  game.turn=null;
  game.turnEndsAt=null;
  game.winner=players.reduce((best,player)=>!best||game.scores[player.id]>game.scores[best.id]?player:best,null)?.id||null;
  const winner=players.find(player=>player.id===game.winner);
  game.chat=[...(game.chat||[]),{from:'Système',text:'Fin de partie : '+reason+'. Gagnant : '+(winner?winner.name:'égalité')+'.'}];
}

async function playWord(){
  if(!state.placed.length)return;
  if(state.turn!==playerId)return;
  const analysis=analyzeMove();
  if(!analysis.ok){
    document.getElementById('infoRow').textContent=analysis.msg;
    document.getElementById('btnPlay').disabled=true;
    return;
  }
  document.getElementById('infoRow').textContent='Vérification du dictionnaire...';
  let dictionary;
  try{
    dictionary=await validateDictionaryWords(analysis.words);
  }catch(e){
    document.getElementById('infoRow').textContent='Dictionnaire indisponible. Réessaie dans quelques secondes.';
    return;
  }
  if(!dictionary.ok){
    document.getElementById('infoRow').textContent='Mot refusé : '+dictionary.invalid.join(', ');
    return;
  }
  const game=structuredClone(currentRoomRow.game);
  const score=analysis.score;
  state.placed.forEach(({r,c,tile})=>{game.board[r][c]=tile;});
  game.scores[playerId]=(game.scores[playerId]||0)+score;
  game.bag=state.bag;
  game.racks[playerId]=state.rack;
  const n=7-game.racks[playerId].length;
  for(let i=0;i<n&&game.bag.length;i++)game.racks[playerId].push(game.bag.pop());
  game.turn=state.oppId;
  game.turnEndsAt=nextTurnEndsAt();
  game.passCount=0;
  game.chat=[...(game.chat||[]),{from:'Système',text:state.myName+' a joué '+analysis.words.map(w=>w.word).join(', ')+' (+'+score+' pts)'}];
  if(game.bag.length===0&&game.racks[playerId].length===0){
    finishGame(game,playerId,state.myName+' a vidé son chevalet');
  }
  state.placed=[];state.selectedTileIdx=-1;
  await saveGame(game);
}

async function passTurn(){
  if(state.turn!==playerId)return;
  recallTiles();
  const game=structuredClone(currentRoomRow.game);
  game.racks[playerId]=state.rack;
  game.turn=state.oppId;
  game.turnEndsAt=nextTurnEndsAt();
  game.passCount=(game.passCount||0)+1;
  game.chat=[...(game.chat||[]),{from:'Système',text:state.myName+' a passé son tour.'}];
  if(game.passCount>=6){
    finishGame(game,null,'six tours passés consécutivement');
  }
  await saveGame(game);
}

async function exchangeSelectedTiles(){
  if(state.turn!==playerId||!currentRoomRow)return;
  if(state.placed.length){document.getElementById('infoRow').textContent='Rappelle les lettres posées avant un échange.';return;}
  if(state.selectedTileIdx<0){document.getElementById('infoRow').textContent='Sélectionne une lettre à échanger.';return;}
  const game=structuredClone(currentRoomRow.game);
  if((game.bag||[]).length<7){document.getElementById('infoRow').textContent='Échange interdit : il faut au moins 7 lettres dans le sac.';return;}
  const removed=game.racks[playerId].splice(state.selectedTileIdx,1);
  game.bag=shuffle([...game.bag,...removed]);
  game.racks[playerId].push(game.bag.pop());
  game.turn=state.oppId;
  game.turnEndsAt=nextTurnEndsAt();
  game.passCount=(game.passCount||0)+1;
  game.chat=[...(game.chat||[]),{from:'Système',text:state.myName+' a échangé 1 lettre.'}];
  state.selectedTileIdx=-1;
  await saveGame(game);
}

function updateUI(){
  if(state.gameOver){
    const winnerName=state.winner===playerId?state.myName:(state.winner===state.oppId?state.oppName:'égalité');
    const badge=document.getElementById('turnBadge');
    badge.textContent='Partie terminée - '+winnerName;
    badge.className='turn-badge';
    document.getElementById('myScore').textContent=state.scores[playerId]||0;
    document.getElementById('oppScore').textContent=state.scores[state.oppId]||0;
    document.getElementById('btnPlay').disabled=true;
    document.getElementById('infoRow').textContent='Score final.';
    return;
  }
  const my=state.turn===playerId;
  const badge=document.getElementById('turnBadge');
  badge.textContent=my?'Ton tour !':'Tour de '+state.oppName;
  badge.className='turn-badge'+(my?' my':'');
  document.getElementById('myScore').textContent=state.scores[playerId]||0;
  document.getElementById('oppScore').textContent=state.scores[state.oppId]||0;
  document.getElementById('btnPlay').disabled=!my||!state.placed.length;
  updateTimerText();
}

function updateTimerText(){
  if(state.gameOver)return;
  const seconds=state.turnEndsAt?Math.max(0,Math.ceil((new Date(state.turnEndsAt)-Date.now())/1000)):0;
  const min=String(Math.floor(seconds/60)).padStart(2,'0');
  const sec=String(seconds%60).padStart(2,'0');
  document.getElementById('infoRow').textContent=state.bag.length+' lettres restantes dans le sac | Temps : '+min+':'+sec;
  if(seconds===0&&state.turn===playerId&&currentRoomRow&&!autoPassing){
    autoPassing=true;
    passTurn().finally(()=>{autoPassing=false;});
  }
}

function startTurnTimer(){
  if(turnTimer)clearInterval(turnTimer);
  updateTimerText();
  turnTimer=setInterval(updateTimerText,1000);
}

function addChat(from,text,persist=false){
  const box=document.getElementById('chatBox');
  const d=document.createElement('div');
  d.className='chat-msg';
  d.innerHTML='<span class="chat-from">'+from+'</span> : '+text;
  box.appendChild(d);
  box.scrollTop=box.scrollHeight;
  if(persist&&currentRoomRow){
    const game=structuredClone(currentRoomRow.game);
    game.chat=[...(game.chat||[]),{from,text}];
    saveGame(game);
  }
}

function renderChat(){
  const box=document.getElementById('chatBox');
  box.innerHTML='';
  (state.chat||[]).slice(-60).forEach(msg=>{
    const d=document.createElement('div');
    d.className='chat-msg';
    d.innerHTML='<span class="chat-from">'+msg.from+'</span> : '+msg.text;
    box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;
}

function sendChat(){
  const inp=document.getElementById('chatInput');
  const t=inp.value.trim();
  if(!t||!currentRoomRow)return;
  addChat(state.myName,t,true);
  inp.value='';
}

function leaveGame(){
  unsubscribeRoom();
  state=initialState();
  currentRoomRow=null;
  showScreen('lobbyScreen');
}
</script>
